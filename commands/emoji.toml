description = "Turn emoji-speak mode on or off for this session (and persist as default)."

prompt = """
Arguments: {{args}}

Parse the argument:
- "on" → switch to emoji-speak mode starting this response.
- "off" (or no argument) → switch to normal mode starting this response.

Then run one of the following shell commands to persist the choice so the next SessionStart hook honors it:

For "on":
  mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}/emoji-speak" && \
  printf '{\"defaultMode\":\"on\"}\n' > "${XDG_CONFIG_HOME:-$HOME/.config}/emoji-speak/config.json"

For "off":
  mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}/emoji-speak" && \
  printf '{\"defaultMode\":\"off\"}\n' > "${XDG_CONFIG_HOME:-$HOME/.config}/emoji-speak/config.json"

After running the command, acknowledge the mode change. If switching to "on", the acknowledgement and all subsequent prose must be in 100% emoji per the emoji-speak SKILL. If switching to "off", the acknowledgement is plain English: "emoji-speak off."
"""
